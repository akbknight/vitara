<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VITARA — The Vision Deck</title>
  <meta name="description" content="Re-architecting health for the global majority. The VITARA investor deck.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #F8F7F3;
      --cream-2: #F0EEE8;
      --green: #1A5C3F;
      --green-mid: #2A7A55;
      --green-light: rgba(26,92,63,0.15);
      --green-tint: rgba(26,92,63,0.05);
      --gold: #C9973A;
      --ink: #1C1C1A;
      --ink-2: #4A4A45;
      --ink-3: #8A8A82;
      --rule: rgba(28,28,26,0.1);
      --ff-serif: 'Cormorant Garamond', Georgia, serif;
      --ff-sans: 'Plus Jakarta Sans', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--ink);
      color: var(--cream);
      font-family: var(--ff-sans);
      overflow: hidden;
    }

    /* ── Nav bar ─────────────────────────────────────── */
    .deck-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      background: rgba(28,28,26,0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      z-index: 100;
    }

    .deck-nav-brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
    }

    .brand-mark {
      width: 28px;
      height: 28px;
      background: var(--green);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-mark svg { display: block; }

    .brand-name {
      font-family: var(--ff-serif);
      font-size: 1.125rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--cream);
    }

    .deck-meta {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-3);
    }

    .deck-nav-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .slide-counter {
      font-family: var(--ff-sans);
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--ink-3);
      min-width: 48px;
      text-align: right;
    }

    .slide-counter span { color: var(--cream); }

    .fullscreen-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      color: var(--ink-3);
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .fullscreen-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--cream); }

    .back-link {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--ink-3);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.375rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--cream); }

    /* ── Slide stage ─────────────────────────────────── */
    .stage {
      position: fixed;
      top: 56px;
      bottom: 64px;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem 4rem;
      overflow: hidden;
    }

    .slide-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slide {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease, transform 0.35s ease;
      transform: translateX(40px);
    }

    .slide.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0);
    }

    .slide.exit {
      opacity: 0;
      transform: translateX(-40px);
    }

    .slide img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 4px 16px rgba(0,0,0,0.4);
      display: block;
    }

    /* ── Prev / Next arrows ──────────────────────────── */
    .arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      background: rgba(248,247,243,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      z-index: 50;
    }
    .arrow:hover { background: rgba(248,247,243,0.14); border-color: rgba(255,255,255,0.25); }
    .arrow:disabled { opacity: 0.2; pointer-events: none; }
    .arrow svg { display: block; }

    .arrow-prev { left: 1rem; }
    .arrow-next { right: 1rem; }

    /* ── Progress bar + controls footer ─────────────── */
    .deck-footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 0 1.5rem;
      background: rgba(28,28,26,0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.06);
      z-index: 100;
    }

    .progress-track {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: rgba(255,255,255,0.06);
    }

    .progress-fill {
      height: 100%;
      background: var(--green-mid);
      transition: width 0.35s ease;
    }

    .slide-dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      border: none;
      padding: 0;
    }
    .dot.active {
      background: var(--green-mid);
      transform: scale(1.4);
    }
    .dot:hover { background: rgba(255,255,255,0.4); }

    /* ── Keyboard hint ───────────────────────────────── */
    .kbd-hint {
      position: fixed;
      bottom: 72px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.6875rem;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.04em;
      pointer-events: none;
      opacity: 1;
      transition: opacity 1s ease;
    }
    .kbd-hint.hidden { opacity: 0; }
    .kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px; height: 20px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 3px;
      font-size: 0.625rem;
    }

    /* ── CTA slide overlay (last slide) ─────────────── */
    .slide-cta-overlay {
      display: none;
    }

    /* ── Mobile ──────────────────────────────────────── */
    @media (max-width: 640px) {
      .stage { padding: 0.5rem 2.5rem; }
      .arrow { width: 36px; height: 36px; }
      .arrow-prev { left: 0.25rem; }
      .arrow-next { right: 0.25rem; }
      .deck-meta { display: none; }
      .slide-dots { gap: 4px; }
      .dot { width: 5px; height: 5px; }
    }

    /* ── Touch swipe feedback ────────────────────────── */
    .stage { user-select: none; }
  </style>
</head>
<body>

<!-- Nav -->
<nav class="deck-nav">
  <a class="deck-nav-brand" href="../">
    <div class="brand-mark">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 2L14 13H2L8 2Z" fill="#F8F7F3" fill-opacity="0.9"/>
      </svg>
    </div>
    <span class="brand-name">VITARA</span>
  </a>
  <span class="deck-meta">Vision Deck · 2026</span>
  <div class="deck-nav-right">
    <span class="slide-counter"><span id="current-num">1</span> / 14</span>
    <a href="../" class="back-link">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M8.5 3L5 7l3.5 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back to site
    </a>
    <button class="fullscreen-btn" id="fs-btn" title="Toggle fullscreen">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M1 5V1h4M9 1h4v4M13 9v4H9M5 13H1V9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</nav>

<!-- Slides -->
<div class="stage" id="stage">
  <div class="slide-wrapper">
    <div class="slide active" data-index="0">
      <img src="../assets/pitch-slides/slide-01.jpg" alt="Re-architecting Health for the Global Majority — VITARA cover slide" loading="eager">
    </div>
    <div class="slide" data-index="1">
      <img src="../assets/pitch-slides/slide-02.jpg" alt="The Western Default: A Massive Market Failure" loading="lazy">
    </div>
    <div class="slide" data-index="2">
      <img src="../assets/pitch-slides/slide-03.jpg" alt="The Four-Quadrant Matrix of the Forgotten User" loading="lazy">
    </div>
    <div class="slide" data-index="3">
      <img src="../assets/pitch-slides/slide-04.jpg" alt="The Illusion of Health" loading="lazy">
    </div>
    <div class="slide" data-index="4">
      <img src="../assets/pitch-slides/slide-05.jpg" alt="The Reality of Context: Generic Apps vs VITARA" loading="lazy">
    </div>
    <div class="slide" data-index="5">
      <img src="../assets/pitch-slides/slide-06.jpg" alt="Three Dimensions. One Adaptive Blueprint." loading="lazy">
    </div>
    <div class="slide" data-index="6">
      <img src="../assets/pitch-slides/slide-07.jpg" alt="The Adaptive Engine" loading="lazy">
    </div>
    <div class="slide" data-index="7">
      <img src="../assets/pitch-slides/slide-08.jpg" alt="Rethinking the 24-Hour Dial" loading="lazy">
    </div>
    <div class="slide" data-index="8">
      <img src="../assets/pitch-slides/slide-09.jpg" alt="Why Now: The Convergence of Three Forces" loading="lazy">
    </div>
    <div class="slide" data-index="9">
      <img src="../assets/pitch-slides/slide-10.jpg" alt="The Architecture Isn't Niche. It's Universally Adaptive." loading="lazy">
    </div>
    <div class="slide" data-index="10">
      <img src="../assets/pitch-slides/slide-11.jpg" alt="The Beachhead Market: The South Asian Diaspora" loading="lazy">
    </div>
    <div class="slide" data-index="11">
      <img src="../assets/pitch-slides/slide-12.jpg" alt="Go-to-Market Step-Function" loading="lazy">
    </div>
    <div class="slide" data-index="12">
      <img src="../assets/pitch-slides/slide-13.jpg" alt="Built by the User, for the User — Akshay Kumar" loading="lazy">
    </div>
    <div class="slide" data-index="13">
      <img src="../assets/pitch-slides/slide-14.jpg" alt="The Future of Health is Localized. Join the Pilot." loading="lazy">
    </div>
  </div>
</div>

<!-- Arrows -->
<button class="arrow arrow-prev" id="btn-prev" aria-label="Previous slide" disabled>
  <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
    <path d="M11 4L6 9l5 5" stroke="#F8F7F3" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</button>
<button class="arrow arrow-next" id="btn-next" aria-label="Next slide">
  <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
    <path d="M7 4l5 5-5 5" stroke="#F8F7F3" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</button>

<!-- Keyboard hint -->
<div class="kbd-hint" id="kbd-hint">
  <span class="kbd">←</span>
  <span class="kbd">→</span>
  Navigate · <span class="kbd" style="width:auto;padding:0 4px">F</span> Fullscreen
</div>

<!-- Footer -->
<footer class="deck-footer">
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill" style="width: 7.14%"></div>
  </div>
  <div class="slide-dots" id="dots-container"></div>
</footer>

<script>
(function () {
  const TOTAL = 14;
  let current = 0;
  let transitioning = false;

  const slides = document.querySelectorAll('.slide');
  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');
  const currentNum = document.getElementById('current-num');
  const progressFill = document.getElementById('progress-fill');
  const dotsContainer = document.getElementById('dots-container');
  const kbdHint = document.getElementById('kbd-hint');
  const fsBtn = document.getElementById('fs-btn');

  // Build dots
  for (let i = 0; i < TOTAL; i++) {
    const dot = document.createElement('button');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.setAttribute('aria-label', 'Go to slide ' + (i + 1));
    dot.addEventListener('click', () => goTo(i));
    dotsContainer.appendChild(dot);
  }

  const dots = document.querySelectorAll('.dot');

  function updateUI() {
    currentNum.textContent = current + 1;
    progressFill.style.width = ((current + 1) / TOTAL * 100) + '%';
    btnPrev.disabled = current === 0;
    btnNext.disabled = current === TOTAL - 1;
    dots.forEach((d, i) => d.classList.toggle('active', i === current));
  }

  function goTo(index, dir) {
    if (transitioning || index === current || index < 0 || index >= TOTAL) return;
    transitioning = true;

    const fromSlide = slides[current];
    const toSlide = slides[index];
    const forward = index > current;

    // Exit current
    fromSlide.classList.remove('active');
    fromSlide.classList.add('exit');

    // Set entry direction for incoming
    toSlide.style.transform = forward ? 'translateX(40px)' : 'translateX(-40px)';
    toSlide.style.opacity = '0';
    toSlide.style.pointerEvents = 'none';

    // Force reflow
    toSlide.offsetHeight;

    // Animate in
    toSlide.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
    toSlide.style.transform = 'translateX(0)';
    toSlide.style.opacity = '1';
    toSlide.style.pointerEvents = 'auto';

    current = index;
    updateUI();

    setTimeout(() => {
      fromSlide.classList.remove('exit');
      toSlide.style.transition = '';
      toSlide.style.transform = '';
      toSlide.style.opacity = '';
      toSlide.style.pointerEvents = '';
      transitioning = false;
    }, 380);
  }

  btnPrev.addEventListener('click', () => goTo(current - 1));
  btnNext.addEventListener('click', () => goTo(current + 1));

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goTo(current + 1); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); goTo(current - 1); }
    if (e.key === 'f' || e.key === 'F') toggleFullscreen();
    if (e.key === 'Home') goTo(0);
    if (e.key === 'End') goTo(TOTAL - 1);
  });

  // Hide kbd hint after first navigation
  let hintHidden = false;
  function hideHint() {
    if (!hintHidden) {
      hintHidden = true;
      kbdHint.classList.add('hidden');
    }
  }
  btnPrev.addEventListener('click', hideHint);
  btnNext.addEventListener('click', hideHint);
  document.addEventListener('keydown', hideHint);
  setTimeout(() => kbdHint.classList.add('hidden'), 4000);

  // Fullscreen
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen().catch(() => {});
    }
  }
  fsBtn.addEventListener('click', toggleFullscreen);

  // Touch/swipe
  let touchStartX = 0;
  let touchStartY = 0;
  const stage = document.getElementById('stage');

  stage.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  stage.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
      if (dx < 0) goTo(current + 1);
      else goTo(current - 1);
    }
  }, { passive: true });

  // Click on right half / left half of stage
  stage.addEventListener('click', (e) => {
    const rect = stage.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const third = rect.width / 3;
    if (x < third) goTo(current - 1);
    else if (x > third * 2) goTo(current + 1);
  });

  updateUI();
})();
</script>
</body>
</html>
